<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320">
  <defs>
    <style>
      .bg       { fill: #0d1117; }
      .grid     { fill: #7F77DD; opacity: 0.06; }
      .hub-ring { fill: #1a1f2e; stroke: #7F77DD; stroke-width: 1.5; }
      .hub-core { fill: #26215C; stroke: #534AB7; stroke-width: 0.5; }
      .hub-text { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 8.5px; font-weight: 700; fill: #CECBF6; letter-spacing: 0.8px; text-anchor: middle; }
      .edge-pu  { stroke: #534AB7; stroke-width: 0.6; opacity: 0.75; }
      .edge-tl  { stroke: #0F6E56; stroke-width: 0.6; opacity: 0.75; }
      .edge-am  { stroke: #854F0B; stroke-width: 0.6; opacity: 0.75; }
      .edge-pk  { stroke: #993556; stroke-width: 0.6; opacity: 0.75; }
      .edge-co  { stroke: #993C1D; stroke-width: 0.6; opacity: 0.75; }
      .node-pu  { fill: #0f111a; stroke: #534AB7; stroke-width: 0.8; }
      .node-tl  { fill: #0a1210; stroke: #0F6E56; stroke-width: 0.8; }
      .node-am  { fill: #120e08; stroke: #854F0B; stroke-width: 0.8; }
      .node-pk  { fill: #110810; stroke: #993556; stroke-width: 0.8; }
      .node-co  { fill: #110a08; stroke: #993C1D; stroke-width: 0.8; }
      .lbl-pu   { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 8.5px; font-weight: 600; fill: #AFA9EC; text-anchor: middle; }
      .lbl-tl   { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 8.5px; font-weight: 600; fill: #5DCAA5; text-anchor: middle; }
      .lbl-am   { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 8.5px; font-weight: 600; fill: #EF9F27; text-anchor: middle; }
      .lbl-pk   { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 8.5px; font-weight: 600; fill: #ED93B1; text-anchor: middle; }
      .lbl-co   { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 8.5px; font-weight: 600; fill: #F0997B; text-anchor: middle; }
      .sub      { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 7px; fill: #444; text-anchor: middle; }
      .title    { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 26px; font-weight: 700; fill: #e6edf3; letter-spacing: -0.5px; }
      .tagline  { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10.5px; font-weight: 400; fill: #7F77DD; letter-spacing: 1.2px; }
      .motto    { font-family: Georgia, serif; font-size: 10px; font-style: italic; fill: #3a3a3a; }
      .badge-b  { fill: #0d1117; stroke-width: 0.8; rx: 5; }
      .badge-t  { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 8.5px; text-anchor: middle; }
      .stat-t   { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 9px; fill: #555; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="320" rx="14" class="bg"/>

  <!-- Grid dots — 10 cols × 7 rows -->
  <g class="grid">
    <circle cx="60"  cy="35"  r="1.5"/><circle cx="120" cy="35"  r="1.5"/><circle cx="180" cy="35"  r="1.5"/><circle cx="240" cy="35"  r="1.5"/><circle cx="300" cy="35"  r="1.5"/><circle cx="360" cy="35"  r="1.5"/><circle cx="420" cy="35"  r="1.5"/><circle cx="480" cy="35"  r="1.5"/><circle cx="540" cy="35"  r="1.5"/><circle cx="600" cy="35"  r="1.5"/>
    <circle cx="60"  cy="75"  r="1.5"/><circle cx="120" cy="75"  r="1.5"/><circle cx="180" cy="75"  r="1.5"/><circle cx="240" cy="75"  r="1.5"/><circle cx="300" cy="75"  r="1.5"/><circle cx="360" cy="75"  r="1.5"/><circle cx="420" cy="75"  r="1.5"/><circle cx="480" cy="75"  r="1.5"/><circle cx="540" cy="75"  r="1.5"/><circle cx="600" cy="75"  r="1.5"/>
    <circle cx="60"  cy="115" r="1.5"/><circle cx="120" cy="115" r="1.5"/><circle cx="180" cy="115" r="1.5"/><circle cx="240" cy="115" r="1.5"/><circle cx="300" cy="115" r="1.5"/><circle cx="360" cy="115" r="1.5"/><circle cx="420" cy="115" r="1.5"/><circle cx="480" cy="115" r="1.5"/><circle cx="540" cy="115" r="1.5"/><circle cx="600" cy="115" r="1.5"/>
    <circle cx="60"  cy="155" r="1.5"/><circle cx="120" cy="155" r="1.5"/><circle cx="180" cy="155" r="1.5"/><circle cx="240" cy="155" r="1.5"/><circle cx="300" cy="155" r="1.5"/><circle cx="360" cy="155" r="1.5"/><circle cx="420" cy="155" r="1.5"/><circle cx="480" cy="155" r="1.5"/><circle cx="540" cy="155" r="1.5"/><circle cx="600" cy="155" r="1.5"/>
    <circle cx="60"  cy="195" r="1.5"/><circle cx="120" cy="195" r="1.5"/><circle cx="180" cy="195" r="1.5"/><circle cx="240" cy="195" r="1.5"/><circle cx="300" cy="195" r="1.5"/><circle cx="360" cy="195" r="1.5"/><circle cx="420" cy="195" r="1.5"/><circle cx="480" cy="195" r="1.5"/><circle cx="540" cy="195" r="1.5"/><circle cx="600" cy="195" r="1.5"/>
    <circle cx="60"  cy="235" r="1.5"/><circle cx="120" cy="235" r="1.5"/><circle cx="180" cy="235" r="1.5"/><circle cx="240" cy="235" r="1.5"/><circle cx="300" cy="235" r="1.5"/><circle cx="360" cy="235" r="1.5"/><circle cx="420" cy="235" r="1.5"/><circle cx="480" cy="235" r="1.5"/><circle cx="540" cy="235" r="1.5"/><circle cx="600" cy="235" r="1.5"/>
    <circle cx="60"  cy="280" r="1.5"/><circle cx="120" cy="280" r="1.5"/><circle cx="180" cy="280" r="1.5"/><circle cx="240" cy="280" r="1.5"/><circle cx="300" cy="280" r="1.5"/><circle cx="360" cy="280" r="1.5"/><circle cx="420" cy="280" r="1.5"/><circle cx="480" cy="280" r="1.5"/><circle cx="540" cy="280" r="1.5"/><circle cx="600" cy="280" r="1.5"/>
  </g>

  <!-- ── Edges from hub (430, 160) to each cluster node ── -->
  <!-- knowledge top-left -->
  <line x1="409" y1="140" x2="298"  y2="88"  class="edge-pu"/>
  <!-- files left -->
  <line x1="404" y1="160" x2="278"  y2="160" class="edge-tl"/>
  <!-- media bottom-left -->
  <line x1="409" y1="179" x2="298"  y2="228" class="edge-tl"/>
  <!-- robotics bottom -->
  <line x1="430" y1="186" x2="430"  y2="244" class="edge-co"/>
  <!-- creative bottom-right -->
  <line x1="451" y1="179" x2="562"  y2="228" class="edge-am"/>
  <!-- agents right -->
  <line x1="456" y1="160" x2="582"  y2="160" class="edge-pk"/>
  <!-- infra top-right -->
  <line x1="451" y1="140" x2="562"  y2="88"  class="edge-pu"/>

  <!-- ── Hub ── -->
  <circle cx="430" cy="160" r="30"  class="hub-ring"/>
  <circle cx="430" cy="160" r="22"  class="hub-core"/>
  <text class="hub-text" x="430" y="156">CLAUDE</text>
  <text class="hub-text" x="430" y="168">DESKTOP</text>

  <!-- ── Cluster: knowledge (top-left) ── -->
  <rect x="222" y="66" width="152" height="42" rx="6" class="node-pu"/>
  <text class="lbl-pu" x="298" y="82">knowledge</text>
  <text class="sub"    x="298" y="96">advanced-memory · docsops</text>

  <!-- ── Cluster: files (left) ── -->
  <rect x="176" y="141" width="102" height="38" rx="6" class="node-tl"/>
  <text class="lbl-tl" x="227" y="156">files + git</text>
  <text class="sub"    x="227" y="169">fileops · gitops</text>

  <!-- ── Cluster: media (bottom-left) ── -->
  <rect x="196" y="208" width="204" height="42" rx="6" class="node-tl"/>
  <text class="lbl-tl" x="298" y="224">library + media</text>
  <text class="sub"    x="298" y="238">calibreops · plexops</text>

  <!-- ── Cluster: robotics (bottom) ── -->
  <rect x="340" y="244" width="180" height="42" rx="6" class="node-co"/>
  <text class="lbl-co" x="430" y="260">robotics + ROS 2</text>
  <text class="sub"    x="430" y="274">yahboom · robofang</text>

  <!-- ── Cluster: creative (bottom-right) ── -->
  <rect x="462" y="208" width="200" height="42" rx="6" class="node-am"/>
  <text class="lbl-am" x="562" y="224">creative + 3D</text>
  <text class="sub"    x="562" y="238">blender · worldlabs · inkscape</text>

  <!-- ── Cluster: agents (right) ── -->
  <rect x="582" y="141" width="136" height="38" rx="6" class="node-pk"/>
  <text class="lbl-pk" x="650" y="156">agents</text>
  <text class="sub"    x="650" y="169">openclaude · openmanus</text>

  <!-- ── Cluster: infra (top-right) ── -->
  <rect x="462" y="66" width="200" height="42" rx="6" class="node-pu"/>
  <text class="lbl-pu" x="562" y="82">dev + infra</text>
  <text class="sub"    x="562" y="96">dark-app-factory · meta-mcp</text>

  <!-- ── Right panel: title block ── -->
  <text class="title"   x="690" y="80">sandraschi</text>
  <text class="tagline" x="692" y="100">MCP FLEET ARCHITECT · VIENNA</text>

  <!-- divider -->
  <line x1="672" y1="112" x2="838" y2="112" stroke="#1e2030" stroke-width="0.8"/>

  <!-- stat row -->
  <text class="stat-t" x="700" y="132">135+</text>
  <text class="stat-t" x="700" y="144">repos</text>
  <text class="stat-t" x="755" y="132">30+</text>
  <text class="stat-t" x="755" y="144">MCP servers</text>
  <text class="stat-t" x="810" y="132">RTX 4090</text>
  <text class="stat-t" x="810" y="144">Goliath</text>

  <!-- stack badges -->
  <rect x="672" y="158" width="78"  height="18" rx="4" class="badge-b" stroke="#26215C"/>
  <text class="badge-t" x="711" y="171" fill="#7F77DD">Python 3.13</text>

  <rect x="756" y="158" width="84"  height="18" rx="4" class="badge-b" stroke="#26215C"/>
  <text class="badge-t" x="798" y="171" fill="#7F77DD">FastMCP 3.2</text>

  <rect x="672" y="182" width="72"  height="18" rx="4" class="badge-b" stroke="#0F6E56"/>
  <text class="badge-t" x="708" y="195" fill="#1D9E75">ROS 2 Humble</text>

  <rect x="750" y="182" width="90"  height="18" rx="4" class="badge-b" stroke="#0F6E56"/>
  <text class="badge-t" x="795" y="195" fill="#1D9E75">Claude Desktop</text>

  <rect x="672" y="206" width="66"  height="18" rx="4" class="badge-b" stroke="#854F0B"/>
  <text class="badge-t" x="705" y="219" fill="#EF9F27">Blender</text>

  <rect x="744" y="206" width="96"  height="18" rx="4" class="badge-b" stroke="#854F0B"/>
  <text class="badge-t" x="792" y="219" fill="#EF9F27">DaVinci Resolve</text>

  <!-- motto -->
  <text class="motto" x="692" y="256">Sin temor y sin esperanza</text>

  <!-- glama link -->
  <rect x="672" y="268" width="170" height="20" rx="5" class="badge-b" stroke="#26215C"/>
  <text class="badge-t" x="757" y="282" fill="#7F77DD">glama.ai/mcp/servers?query=sandraschi</text>

  <!-- bottom stat line -->
  <text x="672" y="305" font-family="'Segoe UI',sans-serif" font-size="8.5" fill="#2a2a2a">Cursor · Windsurf · Antigravity · Ollama · LM Studio · Docker · Tailscale</text>
</svg>
