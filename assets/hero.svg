<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400">
  <defs>
    <style>
      .bg       { fill: #0d1117; }
      .grid     { fill: #7F77DD; opacity: 0.08; }
      .hub-ring { fill: #1a1f2e; stroke: #7F77DD; stroke-width: 2.5; }
      .hub-core { fill: #26215C; stroke: #534AB7; stroke-width: 1; }
      .hub-text { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: 800; fill: #CECBF6; letter-spacing: 1px; text-anchor: middle; }
      
      .edge     { stroke-width: 1.5; opacity: 0.6; }
      .edge-pu  { stroke: #7F77DD; }
      .edge-tl  { stroke: #5DCAA5; }
      .edge-am  { stroke: #EF9F27; }
      .edge-pk  { stroke: #ED93B1; }
      .edge-co  { stroke: #F0997B; }

      .node-bg  { fill: #161b22; stroke-width: 1.5; rx: 8; }
      .node-pu  { stroke: #7F77DD; }
      .node-tl  { stroke: #5DCAA5; }
      .node-am  { stroke: #EF9F27; }
      .node-pk  { stroke: #ED93B1; }
      .node-co  { stroke: #F0997B; }

      .lbl-main { font-family: 'Segoe UI', sans-serif; font-size: 15px; font-weight: 700; text-anchor: middle; }
      .lbl-sub  { font-family: 'Segoe UI', sans-serif; font-size: 11px; font-weight: 400; text-anchor: middle; opacity: 0.8; }
      
      .txt-pu   { fill: #AFA9EC; }
      .txt-tl   { fill: #5DCAA5; }
      .txt-am   { fill: #EF9F27; }
      .txt-pk   { fill: #ED93B1; }
      .txt-co   { fill: #F0997B; }

      .title    { font-family: 'Segoe UI', sans-serif; font-size: 32px; font-weight: 800; fill: #e6edf3; letter-spacing: -1px; }
      .tagline  { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; fill: #7F77DD; letter-spacing: 2px; }
      .stat-val { font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: 700; fill: #e6edf3; text-anchor: middle; }
      .stat-lbl { font-family: 'Segoe UI', sans-serif; font-size: 10px; font-weight: 400; fill: #7F77DD; text-anchor: middle; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="860" height="400" rx="20" class="bg"/>

  <!-- Hub centered at 340, 200 (moved left to give info panel more room) -->
  <g transform="translate(340, 200)">
    <!-- Edges -->
    <line x1="0" y1="0" x2="-140" y2="-100" class="edge edge-pu"/> <!-- Knowledge -->
    <line x1="0" y1="0" x2="-180" y2="0"    class="edge edge-tl"/> <!-- Files -->
    <line x1="0" y1="0" x2="-140" y2="100"  class="edge edge-tl"/> <!-- Media -->
    <line x1="0" y1="0" x2="0"    y2="130"  class="edge edge-co"/> <!-- Robotics -->
    <line x1="0" y1="0" x2="140"  y2="100"  class="edge edge-am"/> <!-- Creative -->
    <line x1="0" y1="0" x2="180"  y2="0"    class="edge edge-pk"/> <!-- Agents -->
    <line x1="0" y1="0" x2="140"  y2="-100" class="edge edge-pu"/> <!-- Infra -->

    <!-- Central Hub -->
    <circle r="45" class="hub-ring"/>
    <circle r="36" class="hub-core"/>
    <text y="-5" class="hub-text">MCP</text>
    <text y="15" class="hub-text">CLIENT</text>

    <!-- Cluster: Knowledge -->
    <g transform="translate(-140, -100)">
      <rect x="-80" y="-30" width="160" height="55" class="node-bg node-pu"/>
      <text y="-8" class="lbl-main txt-pu">KNOWLEDGE</text>
      <text y="10" class="lbl-sub txt-pu">advanced-memory · docsops</text>
    </g>

    <!-- Cluster: Files -->
    <g transform="translate(-200, 0)">
      <rect x="-70" y="-25" width="140" height="50" class="node-bg node-tl"/>
      <text y="-5" class="lbl-main txt-tl">FILES + GIT</text>
      <text y="12" class="lbl-sub txt-tl">fileops · gitops</text>
    </g>

    <!-- Cluster: Media -->
    <g transform="translate(-140, 100)">
      <rect x="-90" y="-25" width="180" height="50" class="node-bg node-tl"/>
      <text y="-5" class="lbl-main txt-tl">LIBRARY + MEDIA</text>
      <text y="12" class="lbl-sub txt-tl">calibreops · plexops</text>
    </g>

    <!-- Cluster: Robotics -->
    <g transform="translate(0, 130)">
      <rect x="-85" y="-25" width="170" height="50" class="node-bg node-co"/>
      <text y="-5" class="lbl-main txt-co">ROBOTICS + ROS 2</text>
      <text y="12" class="lbl-sub txt-co">yahboom · robofang</text>
    </g>

    <!-- Cluster: Creative -->
    <g transform="translate(140, 100)">
      <rect x="-95" y="-25" width="190" height="50" class="node-bg node-am"/>
      <text y="-5" class="lbl-main txt-am">CREATIVE + 3D</text>
      <text y="12" class="lbl-sub txt-am">blender · worldlabs</text>
    </g>

    <!-- Cluster: Agents -->
    <g transform="translate(200, 0)">
      <rect x="-80" y="-25" width="160" height="50" class="node-bg node-pk"/>
      <text y="-5" class="lbl-main txt-pk">AGENTS</text>
      <text y="12" class="lbl-sub txt-pk">openclaude · manus</text>
    </g>

    <!-- Cluster: Infra -->
    <g transform="translate(140, -100)">
      <rect x="-90" y="-25" width="180" height="50" class="node-bg node-pu"/>
      <text y="-5" class="lbl-main txt-pu">DEV + INFRA</text>
      <text y="12" class="lbl-sub txt-pu">dark-factory · meta-mcp</text>
    </g>
  </g>

  <!-- Side Panel: Info -->
  <g transform="translate(620, 100)">
    <text class="title">sandraschi</text>
    <text y="25" class="tagline">90 NODE FLEET · ALSERGRUND</text>
    
    <line x1="0" y1="45" x2="200" y2="45" stroke="#1e2030" stroke-width="2"/>
    
    <g transform="translate(30, 80)">
      <text class="stat-val">135+</text>
      <text y="15" class="stat-lbl">Repos</text>
    </g>
    <g transform="translate(100, 80)">
      <text class="stat-val">30+</text>
      <text y="15" class="stat-lbl">Servers</text>
    </g>
    <g transform="translate(170, 80)">
      <text class="stat-val">RTX 4090</text>
      <text y="15" class="stat-lbl">Goliath</text>
    </g>
    
    <text x="0" y="130" font-family="monospace" font-size="12" fill="#7F77DD">PYTHON 3.13 · FASTMCP 3.2</text>
    <text x="0" y="150" font-family="monospace" font-size="12" fill="#5DCAA5">ROS 2 · CLAUDE · LLAMA</text>
    
    <text x="0" y="180" font-family="Georgia" font-style="italic" font-size="12" fill="#3a3a3a">"Sin temor y sin esperanza."</text>
  </g>
</svg>
